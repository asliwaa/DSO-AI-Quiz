<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz - DSO</title>
    <link rel="icon" type="image/png" href="favicon_bz.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div>
                <label for="categorySelect" style="margin-right: 10px; font-weight: 500;">Dział:</label>
                <select id="categorySelect">
                    </select>
            </div>
            <div class="score-display">
                Wynik: <span id="scoreText">0 / 0 (0%)</span>
            </div>
        </header>

        <div class="quiz-body">
            <div id="emptyState" class="empty-state">
                Wybierz kategorię z menu powyżej, aby rozpocząć test.
            </div>

            <div id="quizArea" style="display: none;">
                <div class="question-header">
                    <span id="questionCounter">Pytanie 1</span>
                    <span style="color: var(--primary);">Wielokrotnego wyboru</span>
                </div>
                
                <div class="question-text" id="questionText">Treść pytania pojawi się tutaj...</div>
                
                <div class="options-list" id="optionsList">
                    </div>

                <div id="correctAnswersBox" class="correct-answers-box">
                    <strong>Prawidłowe odpowiedzi to:</strong>
                    <ul id="correctAnswersList"></ul>
                </div>

                <div class="actions">
                    <button id="btnCheck" class="btn-primary">Sprawdź odpowiedź</button>
                    <button id="btnNext" class="btn-primary" style="display: none;">Następne pytanie</button>
                    <button id="btnReset" class="btn-secondary" style="margin-left: auto;">Resetuj test</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
